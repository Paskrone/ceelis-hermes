name: build-image

on:
  push:
    branches: [main]
    paths:
      - "docker/**"
      - "railway/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Upstream hermes-agent tag to base on"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            UPSTREAM_TAG=${{ inputs.upstream_tag || 'latest' }}
          tags: |
            ghcr.io/paskrone/ceelis-hermes:latest
            ghcr.io/paskrone/ceelis-hermes:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
